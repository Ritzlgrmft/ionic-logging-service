#trigger:
#- main

pool:
  vmImage: 'macOS-latest'

variables:
  NODE_NO_WARNINGS: 1

steps:

- task: UseNode@1
  displayName: 'Use Node 24.x'
  inputs:
    version: 24.x

- task: Npm@1
  displayName: 'npm install'
  inputs:
    verbose: false

- task: Npm@1
  displayName: 'Build ionic-logging-service'
  inputs:
    command: custom
    verbose: false
    customCommand: 'run build-service'

- task: PublishBuildArtifacts@1
  displayName: 'Publish ionic-logging-service'
  inputs:
    PathtoPublish: 'dist/ionic-logging-service'
    ArtifactName: 'ionic-logging-service'
    publishLocation: 'Container'

- task: Npm@1
  displayName: 'Build ionic-logging-viewer'
  inputs:
    command: custom
    verbose: false
    customCommand: 'run build-viewer'

- task: PublishBuildArtifacts@1
  displayName: 'Publish ionic-logging-viewer'
  inputs:
    PathtoPublish: 'dist/ionic-logging-viewer'
    ArtifactName: 'ionic-logging-viewer'
    publishLocation: 'Container'

- task: Npm@1
  displayName: 'Build ionic-logging-viewer-app'
  inputs:
    command: custom
    verbose: false
    customCommand: 'run build-viewer-app'

- script: npx playwright install
  displayName: 'Install Playwright browsers'

- task: DeleteFiles@1
  displayName: 'Delete unit test results (ionic-logging-service)'
  inputs:
    SourceFolder: projects/ionic-logging-service/junit
    Contents: 'TESTS*.xml'

- task: DeleteFiles@1
  displayName: 'Delete unit test results (ionic-logging-viewer)'
  inputs:
    SourceFolder: projects/ionic-logging-viewer/junit
    Contents: 'TESTS*.xml'

- task: Npm@1
  displayName: 'Run tests'
  inputs:
    command: custom
    verbose: false
    customCommand: 'test'

- task: PublishTestResults@2
  displayName: 'Publish unit test results (ionic-logging-service)'
  condition: succeededOrFailed()
  inputs:
    searchFolder: $(System.DefaultWorkingDirectory)/junit/ionic-logging-service
    testRunTitle: Unit Tests ionic-logging-service
    testResultsFormat: JUnit
    testResultsFiles: "test-results.xml"
    failTaskOnMissingResultsFile: true

- task: PublishTestResults@2
  displayName: 'Publish unit test results (ionic-logging-viewer)'
  condition: succeededOrFailed()
  inputs:
    searchFolder: $(System.DefaultWorkingDirectory)/junit/ionic-logging-viewer
    testRunTitle: Unit Tests ionic-logging-viewer
    testResultsFormat: JUnit
    testResultsFiles: "test-results.xml"
    failTaskOnMissingResultsFile: true

- task: PublishCodeCoverageResults@2
  displayName: 'Publish code coverage results (ionic-logging-service)'
  condition: succeededOrFailed()
  inputs:
    summaryFileLocation: $(System.DefaultWorkingDirectory)/coverage/ionic-logging-service/cobertura-coverage.xml
    failIfCoverageEmpty: true

- task: PublishCodeCoverageResults@2
  displayName: 'Publish code coverage results (ionic-logging-viewer)'
  condition: succeededOrFailed()
  inputs:
    summaryFileLocation: $(System.DefaultWorkingDirectory)/coverage/ionic-logging-viewer/cobertura-coverage.xml
    failIfCoverageEmpty: true
